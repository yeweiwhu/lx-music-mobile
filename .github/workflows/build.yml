name: Build Android APK

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Create placeholder keystore.properties
        run: |
          echo "storeFile=debug.keystore" > android/keystore.properties
          echo "storePassword=android" >> android/keystore.properties
          echo "keyAlias=androiddebugkey" >> android/keystore.properties
          echo "keyPassword=android" >> android/keystore.properties

      - name: Build debug APK
        run: |
          cd android && ./gradlew assembleDebug
          find . -name "*.apk" 2>/dev/null || dir /s /b *.apk 2>nul

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lx-music-mobile-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
